name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            archive_name: rkimg-linux-x64.tar.gz
            artifact_name: rkimg-linux-x64
            binary_path: build/rkimg
          - name: windows-x64
            os: windows-latest
            archive_name: rkimg-windows-x64.zip
            artifact_name: rkimg-windows-x64
            binary_path: build/Release/rkimg.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp README.md dist/
          cp "${{ matrix.binary_path }}" dist/rkimg
          tar -czf "${{ matrix.archive_name }}" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item README.md dist\README.md
          Copy-Item "${{ matrix.binary_path }}" dist\rkimg.exe
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/rkimg-linux-x64/rkimg-linux-x64.tar.gz
            release-artifacts/rkimg-windows-x64/rkimg-windows-x64.zip
