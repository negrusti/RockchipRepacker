name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            || gh release edit "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}"

  build-and-upload:
    name: Build and Upload (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            archive_name: rkimg-linux-x64.tar.gz
            binary_path: build/rkimg
          - name: windows-x64
            os: windows-latest
            archive_name: rkimg-windows-x64.zip
            binary_path: build/Release/rkimg.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp README.md dist/
          cp "${{ matrix.binary_path }}" dist/rkimg
          tar -czf "${{ matrix.archive_name }}" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item README.md dist\README.md
          Copy-Item "${{ matrix.binary_path }}" dist\rkimg.exe
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload asset to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "${{ matrix.archive_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
